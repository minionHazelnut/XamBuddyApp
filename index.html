<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>XamBuddy</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      background: #f5f5f5;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #333;
    }

    label:first-of-type {
      margin-top: 0;
    }

    input,
    select,
    button {
      width: 100%;
      padding: 10px;
      margin-bottom: 4px;
      border-radius: 5px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    input[type="number"] {
      font-size: 1rem;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      opacity: 1;
      height: 2.25rem;
    }

    .hint {
      font-size: 0.8rem;
      color: #666;
      margin: 0 0 12px 0;
    }

    button {
      margin-top: 18px;
      background: #007bff;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background: #0069d9;
    }

    .output {
      margin-top: 20px;
      padding: 15px;
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 5px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>XamBuddy Question Generator</h2>

  <label for="fileInput">Source PDF</label>
  <input type="file" id="fileInput" accept=".pdf,application/pdf" />

  <label for="examSelect">Exam</label>
  <select id="examSelect" required>
    <option value="10th CBSE Board">10th CBSE Board</option>
    <option value="12th CBSE Board">12th CBSE Board</option>
  </select>

  <label for="subjectSelect">Subject</label>
  <select id="subjectSelect" required>
    <option value="Psychology">Psychology</option>
    <option value="Mathematics">Mathematics</option>
    <option value="Physics">Physics</option>
    <option value="Chemistry">Chemistry</option>
    <option value="Biology">Biology</option>
    <option value="English">English</option>
    <option value="Hindi">Hindi</option>
    <option value="History">History</option>
    <option value="Geography">Geography</option>
    <option value="Political Science">Political Science</option>
    <option value="Economics">Economics</option>
    <option value="Computer Science">Computer Science</option>
  </select>

  <label for="chapterSelect">Chapter</label>
  <select id="chapterSelect" required></select>
  <p class="hint">Chapters follow your syllabus order for the exam and subject you chose.</p>

  <label for="qType">Question type</label>
  <select id="qType">
    <option value="mcq">MCQ</option>
    <option value="short">Short Answer</option>
    <option value="long">Long Answer</option>
  </select>

  <label for="difficulty">Difficulty</label>
  <select id="difficulty">
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="hard">Hard</option>
  </select>

  <label for="numQs">Number of questions</label>
  <input
    type="number"
    id="numQs"
    min="1"
    max="50"
    step="1"
    value="5"
    inputmode="numeric"
  />
  <p class="hint">Use the arrows or type a number (1–50).</p>

  <button type="button" id="generateBtn">Generate</button>

  <div class="output" id="outputBox">
    Your questions will appear here...
  </div>
</div>

<script>
  function getApiBase() {
    if (window.location.protocol === 'file:') {
      return 'http://127.0.0.1:8000';
    }
    var port = window.location.port;
    if (port && port !== '8000') {
      return window.location.protocol + '//127.0.0.1:8000';
    }
    return '';
  }

  function refreshChapterDropdown() {
    var root = window.CHAPTERS_BY_EXAM_SUBJECT || {};
    var exam = document.getElementById('examSelect').value;
    var subject = document.getElementById('subjectSelect').value;
    var sel = document.getElementById('chapterSelect');
    var list = (root[exam] && root[exam][subject]) || [];
    sel.innerHTML = '';
    if (list.length === 0) {
      var ph = document.createElement('option');
      ph.value = '';
      ph.textContent = 'No chapters — edit static/chapters.js for this exam/subject';
      sel.appendChild(ph);
      return;
    }
    list.forEach(function (name) {
      var o = document.createElement('option');
      o.value = name;
      o.textContent = name;
      sel.appendChild(o);
    });
  }

  async function generateQuestions() {
    var fileInput = document.getElementById('fileInput');
    var file = fileInput.files[0];
    var outputBox = document.getElementById('outputBox');

    if (!file) {
      outputBox.textContent = 'Please choose a PDF file to upload.';
      return;
    }

    var numEl = document.getElementById('numQs');
    var numRaw = numEl.value;
    var numQ = parseInt(numRaw, 10);
    if (numRaw === '' || isNaN(numQ) || numQ < 1) {
      outputBox.textContent = 'Enter a valid number of questions (1 or more).';
      return;
    }
    if (numQ > 50) {
      outputBox.textContent = 'Maximum is 50 questions.';
      return;
    }

    var exam = document.getElementById('examSelect').value;
    var subject = document.getElementById('subjectSelect').value;
    if (!exam || !subject) {
      outputBox.textContent = 'Please choose an exam and a subject.';
      return;
    }

    var chapter = document.getElementById('chapterSelect').value.trim();
    if (!chapter) {
      outputBox.textContent = 'Please choose a chapter (load the page via the API if the list is empty).';
      return;
    }

    var formData = new FormData();
    formData.append('file', file);
    formData.append('exam', exam);
    formData.append('subject', subject);
    formData.append('chapter', chapter);
    formData.append('difficulty', document.getElementById('difficulty').value);
    formData.append('q_type', document.getElementById('qType').value);
    formData.append('num_q', String(numQ));

    var base = getApiBase();
    var url = base ? base.replace(/\/$/, '') + '/generate' : '/generate';

    outputBox.textContent = 'Generating…';

    try {
      var res = await fetch(url, {
        method: 'POST',
        body: formData,
      });
      var text = await res.text();
      var data;
      try {
        data = text ? JSON.parse(text) : {};
      } catch (parseErr) {
        outputBox.textContent =
          'Server returned non-JSON (' +
          res.status +
          '). Is uvicorn running on port 8000?\n\n' +
          text.slice(0, 800);
        return;
      }

      if (!res.ok) {
        var detail = data.detail;
        var msg =
          typeof detail === 'string'
            ? detail
            : Array.isArray(detail)
              ? detail
                  .map(function (d) {
                    return d.msg || JSON.stringify(d);
                  })
                  .join('\n')
              : JSON.stringify(data);
        outputBox.textContent = 'Request failed (' + res.status + '):\n' + msg;
        return;
      }

      if (data.error) {
        outputBox.textContent =
          data.error + (data.raw ? '\n\n--- raw ---\n' + data.raw : '');
        return;
      }

      outputBox.textContent = '';
      data.questions.forEach(function (q, index) {
        outputBox.textContent += (index + 1) + '. ' + q.question + '\n';
        if (q.options) {
          for (var key in q.options) {
            if (Object.prototype.hasOwnProperty.call(q.options, key)) {
              outputBox.textContent += key + '. ' + q.options[key] + '\n';
            }
          }
        }
        outputBox.textContent += '\n';
      });
    } catch (err) {
      outputBox.textContent =
        'Network error calling ' +
        url +
        '. Start the API with: uvicorn main:app --reload (in the XamBuddy folder).\n\n' +
        err.message;
    }
  }

  (function loadChaptersAndWireUi() {
    var base = getApiBase().replace(/\/$/, '');
    var s = document.createElement('script');
    s.src = (base ? base : '') + '/static/chapters.js';
    s.onload = function () {
      refreshChapterDropdown();
      document.getElementById('examSelect').addEventListener('change', refreshChapterDropdown);
      document.getElementById('subjectSelect').addEventListener('change', refreshChapterDropdown);
      document.getElementById('generateBtn').addEventListener('click', generateQuestions);
    };
    s.onerror = function () {
      document.getElementById('outputBox').textContent =
        'Could not load chapter list from /static/chapters.js. Open this app at http://127.0.0.1:8000/ (uvicorn) so static files are served.';
    };
    document.head.appendChild(s);
  })();
</script>

</body>
</html>
